<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Claude Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f14;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2a2a3a;
      --accent: #8b5cf6;
      --accent2: #a78bfa;
      --green: #10b981;
      --yellow: #f59e0b;
      --red: #ef4444;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --text3: #64748b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      min-height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.25s ease; }
    .slide-up { animation: slideUp 0.35s cubic-bezier(.4,0,.2,1); }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: rgba(26, 26, 36, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom, 4px);
      z-index: 100;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 8px 8px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text3);
      font-size: 10px;
      font-weight: 600;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .nav-item.active { color: var(--accent2); }
    .nav-item svg { width: 22px; height: 22px; stroke-width: 1.8; }

    .content {
      padding: max(16px, env(safe-area-inset-top)) 16px 100px;
      min-height: 100dvh;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 12px;
    }

    .card-sm {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .header {
      padding: 16px 16px 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .label {
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 600;
    }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 14px;
    }

    .big-input {
      width: 100%;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 16px;
      color: var(--text);
      font-size: 52px;
      font-weight: 800;
      text-align: center;
      padding: 20px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      letter-spacing: -1px;
    }
    .big-input:focus { border-color: var(--accent); }
    .big-input::placeholder { color: var(--text3); }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 0.2px;
    }
    .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 0;
      border-bottom: 1px solid var(--border);
    }
    .stat-row:last-child { border-bottom: none; padding-bottom: 0; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 11px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .badge-green { background: rgba(16, 185, 129, 0.12); color: #10b981; }
    .badge-yellow { background: rgba(245, 158, 11, 0.12); color: #f59e0b; }
    .badge-red { background: rgba(239, 68, 68, 0.12); color: #ef4444; }
    .badge-purple { background: rgba(139, 92, 246, 0.12); color: #a78bfa; }

    .progress-bar { background: var(--surface2); border-radius: 6px; height: 7px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 6px; transition: width 0.7s cubic-bezier(.4,0,.2,1); }

    .entry-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 14px;
      border-radius: 12px;
      background: var(--surface2);
      margin-bottom: 8px;
    }

    /* Onboarding */
    .onboarding-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 999;
      display: flex;
      flex-direction: column;
      max-width: 430px;
      margin: 0 auto;
      overflow-y: auto;
    }

    .onboarding-step {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 32px 24px max(24px, env(safe-area-inset-bottom));
    }

    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s, transform 0.2s;
    }
    .step-dot.active { background: var(--accent2); transform: scale(1.3); }

    .field-input {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-size: 18px;
      font-weight: 700;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
      margin-top: 8px;
    }
    .field-input:focus { border-color: var(--accent); }
    .field-input::placeholder { color: var(--text3); font-weight: 400; }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── CONSTANTS ─────────────────────────────────────────────
    const STORAGE_KEY = 'claude-pro-tracker-v2';

    const defaultData = () => ({
      settings: {
        monthly_cost: 581768,   // VND default (Claude Pro ~$20 ≈ 581,768đ)
        billing_day: 1,
        weekly_limit: 0,        // weekly message/token limit
        session_limit: 0,       // per-session limit
        reg_date: '',           // ngày đăng ký (YYYY-MM-DD)
        onboarded: false
      },
      entries: []
    });

    const loadData = () => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultData();
        const parsed = JSON.parse(raw);
        return { ...defaultData(), settings: { ...defaultData().settings, ...parsed.settings }, entries: parsed.entries || [] };
      } catch { return defaultData(); }
    };

    const saveData = (data) => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
    };

    // ── HELPERS ───────────────────────────────────────────────
    const todayStr = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    };

    const fmtDate = (s) => {
      const [y,m,d] = s.split('-').map(Number);
      return new Date(y, m-1, d).toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit' });
    };

    // Format số tiền VND
    const fmtVND = (n) => {
      const abs = Math.abs(Math.round(n));
      return abs.toLocaleString('vi-VN') + 'đ';
    };

    // Format ngắn gọn cho card nhỏ (e.g. 291.884đ → 291K)
    const fmtVNDShort = (n) => {
      const abs = Math.abs(Math.round(n));
      if (abs >= 1000000) return (abs / 1000000).toFixed(1) + 'tr';
      if (abs >= 1000) return Math.round(abs / 1000) + 'K';
      return abs + 'đ';
    };

    const fmtPct = (n) => `${Math.round(n)}%`;

    const getCycleInfo = (billing_day) => {
      const now = new Date();
      const day = now.getDate();
      let start;
      if (day >= billing_day) {
        start = new Date(now.getFullYear(), now.getMonth(), billing_day);
      } else {
        start = new Date(now.getFullYear(), now.getMonth() - 1, billing_day);
      }
      const end = billing_day === 1
        ? new Date(start.getFullYear(), start.getMonth() + 1, 0)
        : new Date(start.getFullYear(), start.getMonth() + 1, billing_day - 1);

      const MS = 1000 * 60 * 60 * 24;
      const totalDays = Math.round((end - start) / MS) + 1;
      const daysElapsed = Math.max(1, Math.round((now - start) / MS) + 1);
      const daysRemaining = Math.max(0, totalDays - daysElapsed);
      const cycleStartStr = `${start.getFullYear()}-${String(start.getMonth()+1).padStart(2,'0')}-${String(start.getDate()).padStart(2,'0')}`;
      return { start, end, totalDays, daysElapsed, daysRemaining, cycleStartStr };
    };

    const getMonthEntries = (entries, billing_day) => {
      const { cycleStartStr } = getCycleInfo(billing_day);
      return entries
        .filter(e => e.date >= cycleStartStr)
        .sort((a, b) => a.date.localeCompare(b.date));
    };

    // ── ONBOARDING ────────────────────────────────────────────
    const Onboarding = ({ onComplete }) => {
      const [step, setStep] = useState(0);
      const [regDate, setRegDate] = useState('');
      const [weeklyLimit, setWeeklyLimit] = useState('');
      const [sessionLimit, setSessionLimit] = useState('');
      const [monthlyCost, setMonthlyCost] = useState('581768');

      const TOTAL_STEPS = 4;

      const canNext = () => {
        if (step === 0) return regDate !== '';
        if (step === 1) return weeklyLimit !== '' && !isNaN(Number(weeklyLimit));
        if (step === 2) return sessionLimit !== '' && !isNaN(Number(sessionLimit));
        if (step === 3) return monthlyCost !== '' && !isNaN(Number(monthlyCost)) && Number(monthlyCost) > 0;
        return true;
      };

      const handleNext = () => {
        if (step < TOTAL_STEPS - 1) {
          setStep(s => s + 1);
        } else {
          // Done
          const d = new Date(regDate);
          const billingDay = d.getDate();
          onComplete({
            reg_date: regDate,
            billing_day: billingDay,
            weekly_limit: Number(weeklyLimit),
            session_limit: Number(sessionLimit),
            monthly_cost: Number(monthlyCost),
            onboarded: true,
          });
        }
      };

      const steps = [
        {
          emoji: '📅',
          title: 'Ngày đăng ký Claude',
          subtitle: 'Claude Pro tính phí theo chu kỳ từ ngày anh đăng ký. Nhập ngày đó để em tính đúng chu kỳ thanh toán.',
          input: (
            <div>
              <div className="label" style={{ marginBottom:8 }}>Ngày đăng ký lần đầu</div>
              <input
                type="date"
                className="field-input"
                value={regDate}
                onChange={e => setRegDate(e.target.value)}
                max={todayStr()}
                style={{ fontSize:16 }}
              />
              <div style={{ fontSize:12, color:'var(--text3)', marginTop:8, lineHeight:1.6 }}>
                Xem trong email từ Anthropic hoặc tại <strong>claude.ai → Billing</strong>
              </div>
            </div>
          )
        },
        {
          emoji: '📊',
          title: 'Weekly Limit của anh',
          subtitle: 'Giới hạn usage % mà Claude hiển thị theo tuần. Thường thấy ở claude.ai → Settings → Usage.',
          input: (
            <div>
              <div className="label" style={{ marginBottom:8 }}>Weekly Limit (% hoặc số tin nhắn)</div>
              <div style={{ position:'relative' }}>
                <input
                  type="number"
                  className="field-input"
                  placeholder="Ví dụ: 45"
                  value={weeklyLimit}
                  onChange={e => setWeeklyLimit(e.target.value)}
                  inputMode="decimal"
                  min="0"
                />
              </div>
              <div style={{ fontSize:12, color:'var(--text3)', marginTop:8, lineHeight:1.6 }}>
                Nếu không rõ, anh có thể nhập <strong>100</strong> (mặc định 100%)
              </div>
              <div style={{ display:'flex', gap:8, marginTop:10, flexWrap:'wrap' }}>
                {[45, 50, 100].map(v => (
                  <button key={v} onClick={() => setWeeklyLimit(String(v))} style={{
                    padding:'7px 14px', borderRadius:8,
                    border:`1px solid ${weeklyLimit === String(v) ? 'var(--accent)' : 'var(--border)'}`,
                    background: weeklyLimit === String(v) ? 'rgba(139,92,246,0.15)' : 'var(--surface2)',
                    color: weeklyLimit === String(v) ? 'var(--accent2)' : 'var(--text2)',
                    fontSize:13, fontWeight:700, cursor:'pointer',
                  }}>{v}</button>
                ))}
              </div>
            </div>
          )
        },
        {
          emoji: '💬',
          title: 'Session Limit hiện tại',
          subtitle: 'Giới hạn tin nhắn hoặc % usage trong mỗi conversation window (5 giờ / context window).',
          input: (
            <div>
              <div className="label" style={{ marginBottom:8 }}>Session Limit (số tin nhắn hoặc %)</div>
              <input
                type="number"
                className="field-input"
                placeholder="Ví dụ: 45"
                value={sessionLimit}
                onChange={e => setSessionLimit(e.target.value)}
                inputMode="decimal"
                min="0"
              />
              <div style={{ fontSize:12, color:'var(--text3)', marginTop:8, lineHeight:1.6 }}>
                Claude Pro thường hiển thị cảnh báo khi gần đạt limit này.
                Nếu không rõ, nhập <strong>45</strong>.
              </div>
              <div style={{ display:'flex', gap:8, marginTop:10, flexWrap:'wrap' }}>
                {[20, 45, 50].map(v => (
                  <button key={v} onClick={() => setSessionLimit(String(v))} style={{
                    padding:'7px 14px', borderRadius:8,
                    border:`1px solid ${sessionLimit === String(v) ? 'var(--accent)' : 'var(--border)'}`,
                    background: sessionLimit === String(v) ? 'rgba(139,92,246,0.15)' : 'var(--surface2)',
                    color: sessionLimit === String(v) ? 'var(--accent2)' : 'var(--text2)',
                    fontSize:13, fontWeight:700, cursor:'pointer',
                  }}>{v}</button>
                ))}
              </div>
            </div>
          )
        },
        {
          emoji: '💰',
          title: 'Phí tháng của anh',
          subtitle: 'Số tiền anh thực sự trả mỗi tháng cho Claude Pro (tính theo tỷ giá hiện tại).',
          input: (
            <div>
              <div className="label" style={{ marginBottom:8 }}>Phí hàng tháng (VNĐ)</div>
              <div style={{ position:'relative' }}>
                <input
                  type="number"
                  className="field-input"
                  placeholder="581768"
                  value={monthlyCost}
                  onChange={e => setMonthlyCost(e.target.value)}
                  inputMode="numeric"
                  style={{ paddingRight:40 }}
                />
                <span style={{ position:'absolute', right:14, top:'50%', transform:'translateY(-50%)', color:'var(--text3)', fontWeight:700, marginTop:4 }}>đ</span>
              </div>
              <div style={{ fontSize:12, color:'var(--text3)', marginTop:8, lineHeight:1.6 }}>
                Mặc định: <strong style={{color:'var(--text2)'}}>581.768đ</strong> ($20 × 29.088đ/USD)
              </div>
              <div style={{ display:'flex', gap:8, marginTop:10, flexWrap:'wrap' }}>
                {[{ label: '~$20', val: '581768' }, { label: '~$100', val: '2908840' }].map(opt => (
                  <button key={opt.val} onClick={() => setMonthlyCost(opt.val)} style={{
                    padding:'7px 14px', borderRadius:8,
                    border:`1px solid ${monthlyCost === opt.val ? 'var(--accent)' : 'var(--border)'}`,
                    background: monthlyCost === opt.val ? 'rgba(139,92,246,0.15)' : 'var(--surface2)',
                    color: monthlyCost === opt.val ? 'var(--accent2)' : 'var(--text2)',
                    fontSize:13, fontWeight:700, cursor:'pointer',
                  }}>{opt.label}</button>
                ))}
              </div>
            </div>
          )
        }
      ];

      const current = steps[step];

      return (
        <div className="onboarding-overlay">
          <div className="onboarding-step slide-up" key={step}>
            {/* Progress dots */}
            <div style={{ display:'flex', gap:6, marginBottom:32 }}>
              {steps.map((_, i) => (
                <div key={i} className={`step-dot ${i === step ? 'active' : i < step ? 'active' : ''}`}
                  style={{ opacity: i < step ? 0.4 : 1 }}/>
              ))}
            </div>

            {/* Emoji */}
            <div style={{ fontSize:52, marginBottom:16 }}>{current.emoji}</div>

            {/* Title */}
            <div style={{ fontSize:26, fontWeight:800, letterSpacing:'-0.5px', marginBottom:10, lineHeight:1.2 }}>
              {current.title}
            </div>
            <div style={{ fontSize:14, color:'var(--text2)', lineHeight:1.7, marginBottom:28 }}>
              {current.subtitle}
            </div>

            {/* Input */}
            <div style={{ flex:1 }}>
              {current.input}
            </div>

            {/* Nav buttons */}
            <div style={{ marginTop:32, display:'flex', gap:10 }}>
              {step > 0 && (
                <button onClick={() => setStep(s => s-1)} style={{
                  flex:1, background:'var(--surface)', border:'1px solid var(--border)',
                  borderRadius:14, color:'var(--text2)', fontSize:15, fontWeight:600,
                  padding:14, cursor:'pointer',
                }}>← Quay lại</button>
              )}
              <button
                className="btn-primary"
                onClick={handleNext}
                disabled={!canNext()}
                style={{ flex: step > 0 ? 2 : 1 }}
              >
                {step === TOTAL_STEPS - 1 ? '🚀 Bắt đầu dùng!' : 'Tiếp theo →'}
              </button>
            </div>

            {/* Skip hint */}
            {step > 0 && step < TOTAL_STEPS - 1 && (
              <div style={{ textAlign:'center', marginTop:12 }}>
                <button onClick={() => setStep(s => s+1)} style={{
                  background:'none', border:'none', color:'var(--text3)', fontSize:12,
                  cursor:'pointer', padding:'4px 8px',
                }}>Bỏ qua bước này</button>
              </div>
            )}
          </div>
        </div>
      );
    };

    // ── CIRCULAR PROGRESS ─────────────────────────────────────
    const CircularProgress = ({ percent, size = 190 }) => {
      const r = (size - 28) / 2;
      const circ = 2 * Math.PI * r;
      const offset = circ - (Math.min(Math.max(percent, 0), 100) / 100) * circ;
      const color = percent >= 90 ? '#ef4444' : percent >= 70 ? '#f59e0b' : '#8b5cf6';
      const glow = percent >= 90 ? 'rgba(239,68,68,0.3)' : percent >= 70 ? 'rgba(245,158,11,0.3)' : 'rgba(139,92,246,0.3)';
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: 'rotate(-90deg)' }}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--surface2)" strokeWidth="14"/>
          {percent > 0 && (
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={glow} strokeWidth="20"
              strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset} opacity="0.4"/>
          )}
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="14"
            strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset}
            style={{ transition: 'stroke-dashoffset 0.7s cubic-bezier(.4,0,.2,1), stroke 0.3s ease' }}/>
        </svg>
      );
    };

    // ── DASHBOARD ─────────────────────────────────────────────
    const Dashboard = ({ data }) => {
      const { settings, entries } = data;
      const cycle = getCycleInfo(settings.billing_day);
      const monthEntries = getMonthEntries(entries, settings.billing_day);
      const latest = monthEntries.length > 0 ? monthEntries[monthEntries.length - 1] : null;
      const currentPct = latest ? latest.percent : 0;
      const spentVND = (currentPct / 100) * settings.monthly_cost;
      const remainingVND = settings.monthly_cost - spentVND;

      let burnRatePerDay = 0;
      if (monthEntries.length >= 2) {
        const first = monthEntries[0], last = monthEntries[monthEntries.length - 1];
        const [fy,fm,fd] = first.date.split('-').map(Number);
        const [ly,lm,ld] = last.date.split('-').map(Number);
        const daysDiff = Math.max(1, Math.round((new Date(ly,lm-1,ld) - new Date(fy,fm-1,fd)) / 86400000));
        burnRatePerDay = (last.percent - first.percent) / daysDiff;
      } else if (monthEntries.length === 1 && cycle.daysElapsed > 0) {
        burnRatePerDay = monthEntries[0].percent / cycle.daysElapsed;
      }

      const projectedPct = Math.min(100, currentPct + burnRatePerDay * cycle.daysRemaining);
      const wasteVND = Math.max(0, ((100 - projectedPct) / 100) * settings.monthly_cost);
      const burnVND = (burnRatePerDay / 100) * settings.monthly_cost;
      const daysPct = (cycle.daysElapsed / cycle.totalDays) * 100;

      const getStatus = () => {
        if (!latest) return { label: 'Chưa có dữ liệu', cls: 'badge-purple' };
        const ratio = currentPct / Math.max(daysPct, 1);
        if (ratio > 1.3) return { label: '🔥 Dùng nhiều', cls: 'badge-red' };
        if (ratio < 0.4) return { label: '✅ Tiết kiệm', cls: 'badge-green' };
        return { label: '⚡ Bình thường', cls: 'badge-yellow' };
      };
      const status = getStatus();

      // Weekly & session limit info
      const weeklyLimitPct = settings.weekly_limit > 0 ? (currentPct / settings.weekly_limit) * 100 : null;
      const sessionLimitPct = settings.session_limit > 0 ? (currentPct / settings.session_limit) * 100 : null;

      return (
        <div className="fade-in">
          {/* Main card */}
          <div className="card">
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:16 }}>
              <div>
                <div className="label">Chu kỳ hiện tại</div>
                <div style={{ fontSize:13, fontWeight:600, marginTop:3, color:'var(--text2)' }}>
                  {cycle.start.toLocaleDateString('vi-VN',{day:'2-digit',month:'short'})} – {cycle.end.toLocaleDateString('vi-VN',{day:'2-digit',month:'short',year:'numeric'})}
                </div>
              </div>
              <span className={`badge ${status.cls}`}>{status.label}</span>
            </div>

            <div style={{ display:'flex', justifyContent:'center', alignItems:'center', position:'relative', padding:'4px 0 16px' }}>
              <CircularProgress percent={currentPct} size={190}/>
              <div style={{ position:'absolute', textAlign:'center' }}>
                <div style={{ fontSize:40, fontWeight:800, letterSpacing:'-2px', lineHeight:1 }}>{fmtPct(currentPct)}</div>
                <div style={{ fontSize:12, color:'var(--text3)', marginTop:4 }}>đã dùng</div>
              </div>
            </div>

            <div style={{ display:'flex', justifyContent:'space-around', borderTop:'1px solid var(--border)', paddingTop:16 }}>
              <div style={{ textAlign:'center' }}>
                <div style={{ fontSize:20, fontWeight:800, color:'var(--red)' }}>{fmtVNDShort(spentVND)}</div>
                <div className="label" style={{ marginTop:3 }}>đã tiêu</div>
              </div>
              <div style={{ width:1, background:'var(--border)' }}/>
              <div style={{ textAlign:'center' }}>
                <div style={{ fontSize:20, fontWeight:800, color:'var(--green)' }}>{fmtVNDShort(remainingVND)}</div>
                <div className="label" style={{ marginTop:3 }}>còn lại</div>
              </div>
              <div style={{ width:1, background:'var(--border)' }}/>
              <div style={{ textAlign:'center' }}>
                <div style={{ fontSize:20, fontWeight:800 }}>{cycle.daysRemaining}</div>
                <div className="label" style={{ marginTop:3 }}>ngày còn</div>
              </div>
            </div>
          </div>

          {/* Limit cards */}
          {(settings.weekly_limit > 0 || settings.session_limit > 0) && (
            <div className="grid-2">
              {settings.weekly_limit > 0 && (
                <div className="card-sm">
                  <div className="label">Weekly Limit</div>
                  <div style={{ fontSize:20, fontWeight:800, marginTop:8, color: (currentPct/settings.weekly_limit) > 0.8 ? 'var(--red)' : 'var(--text)' }}>
                    {currentPct}/{settings.weekly_limit}
                  </div>
                  <div style={{ marginTop:8 }}>
                    <div className="progress-bar">
                      <div className="progress-bar-fill" style={{ width:`${Math.min(100,(currentPct/settings.weekly_limit)*100)}%`, background: (currentPct/settings.weekly_limit) > 0.8 ? 'var(--red)' : 'var(--accent)' }}/>
                    </div>
                  </div>
                  <div style={{ fontSize:11, color:'var(--text3)', marginTop:4 }}>
                    {fmtPct(Math.min(100,(currentPct/settings.weekly_limit)*100))} đã dùng
                  </div>
                </div>
              )}
              {settings.session_limit > 0 && (
                <div className="card-sm">
                  <div className="label">Session Limit</div>
                  <div style={{ fontSize:20, fontWeight:800, marginTop:8, color: (currentPct/settings.session_limit) > 0.8 ? 'var(--red)' : 'var(--text)' }}>
                    {currentPct}/{settings.session_limit}
                  </div>
                  <div style={{ marginTop:8 }}>
                    <div className="progress-bar">
                      <div className="progress-bar-fill" style={{ width:`${Math.min(100,(currentPct/settings.session_limit)*100)}%`, background: (currentPct/settings.session_limit) > 0.8 ? 'var(--red)' : 'var(--yellow)' }}/>
                    </div>
                  </div>
                  <div style={{ fontSize:11, color:'var(--text3)', marginTop:4 }}>
                    {fmtPct(Math.min(100,(currentPct/settings.session_limit)*100))} đã dùng
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Time vs Usage bar */}
          <div className="card">
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:10 }}>
              <span className="label">Tiến độ chu kỳ</span>
              <span style={{ fontSize:12, color:'var(--text2)', fontWeight:600 }}>Ngày {cycle.daysElapsed}/{cycle.totalDays}</span>
            </div>
            <div style={{ marginBottom:8 }}>
              <div style={{ fontSize:11, color:'var(--text3)', marginBottom:5 }}>⏱ Thời gian: {fmtPct(daysPct)}</div>
              <div className="progress-bar">
                <div className="progress-bar-fill" style={{ width:`${daysPct}%`, background:'var(--border)', filter:'brightness(2)' }}/>
              </div>
            </div>
            <div>
              <div style={{ fontSize:11, color:'var(--text3)', marginBottom:5 }}>⚡ Usage: {fmtPct(currentPct)}</div>
              <div className="progress-bar">
                <div className="progress-bar-fill" style={{ width:`${currentPct}%`, background: currentPct > daysPct * 1.2 ? 'var(--red)' : 'var(--accent)' }}/>
              </div>
            </div>
          </div>

          {/* Stats grid */}
          <div className="grid-2">
            <div className="card-sm">
              <div className="label">Tốc độ đốt</div>
              <div style={{ fontSize:18, fontWeight:800, marginTop:8, color: burnVND > settings.monthly_cost * 0.042 ? 'var(--red)' : 'var(--text)' }}>
                {burnVND > 0 ? fmtVNDShort(burnVND) : '—'}
              </div>
              <div style={{ fontSize:11, color:'var(--text3)', marginTop:3 }}>
                {burnRatePerDay > 0 ? `${burnRatePerDay.toFixed(1)}%/ngày` : 'chưa đủ dữ liệu'}
              </div>
            </div>
            <div className="card-sm">
              <div className="label">Dự báo cuối kỳ</div>
              <div style={{ fontSize:18, fontWeight:800, marginTop:8, color: latest ? (projectedPct >= 90 ? 'var(--green)' : 'var(--yellow)') : 'var(--text)' }}>
                {latest ? fmtPct(projectedPct) : '—'}
              </div>
              <div style={{ fontSize:11, color:'var(--text3)', marginTop:3 }}>
                {latest ? `≈ ${fmtVNDShort((projectedPct/100)*settings.monthly_cost)}` : ''}
              </div>
            </div>
          </div>

          {/* Waste warning */}
          {latest && wasteVND > settings.monthly_cost * 0.05 && (
            <div className="card" style={{ background:'rgba(245,158,11,0.07)', borderColor:'rgba(245,158,11,0.25)' }}>
              <div style={{ display:'flex', gap:14, alignItems:'flex-start' }}>
                <span style={{ fontSize:28, flexShrink:0 }}>💸</span>
                <div>
                  <div style={{ fontWeight:700, marginBottom:5 }}>Có thể lãng phí {fmtVND(wasteVND)}</div>
                  <div style={{ fontSize:13, color:'var(--text2)', lineHeight:1.6 }}>
                    Với tốc độ hiện tại, anh sẽ dùng <strong>{fmtPct(projectedPct)}</strong> cuối kỳ.
                    Còn <strong>{fmtPct(100 - projectedPct)}</strong> ({fmtVND(wasteVND)}) có thể không tận dụng hết.
                  </div>
                </div>
              </div>
            </div>
          )}

          {latest && wasteVND <= settings.monthly_cost * 0.05 && projectedPct >= 90 && (
            <div className="card" style={{ background:'rgba(16,185,129,0.07)', borderColor:'rgba(16,185,129,0.25)' }}>
              <div style={{ display:'flex', gap:14, alignItems:'center' }}>
                <span style={{ fontSize:28 }}>🎯</span>
                <div>
                  <div style={{ fontWeight:700, marginBottom:3 }}>Đang tận dụng tốt!</div>
                  <div style={{ fontSize:13, color:'var(--text2)' }}>
                    Dự báo dùng {fmtPct(projectedPct)} = xứng đáng với {fmtVND(settings.monthly_cost)}/tháng.
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Empty state */}
          {!latest && (
            <div className="card" style={{ textAlign:'center', padding:'32px 20px', background:'rgba(139,92,246,0.06)', borderColor:'rgba(139,92,246,0.2)' }}>
              <div style={{ fontSize:44, marginBottom:14 }}>📊</div>
              <div style={{ fontWeight:700, fontSize:17, marginBottom:8 }}>Chưa có dữ liệu</div>
              <div style={{ fontSize:13, color:'var(--text2)', lineHeight:1.7 }}>
                Vào <strong>Ghi lại</strong> để nhập % usage đầu tiên<br/>
                từ <strong>claude.ai → Settings → Usage</strong>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ── LOG TAB ───────────────────────────────────────────────
    const LogTab = ({ data, onSave }) => {
      const [pct, setPct] = useState('');
      const [note, setNote] = useState('');
      const [saved, setSaved] = useState(false);
      const inputRef = useRef(null);

      const today = todayStr();
      const monthEntries = getMonthEntries(data.entries, data.settings.billing_day);
      const latest = monthEntries.length > 0 ? monthEntries[monthEntries.length - 1] : null;
      const todayEntry = monthEntries.find(e => e.date === today);

      useEffect(() => {
        if (todayEntry) setPct(String(todayEntry.percent));
        const t = setTimeout(() => inputRef.current && inputRef.current.focus(), 400);
        return () => clearTimeout(t);
      }, []);

      const val = parseFloat(pct);
      const isValid = !isNaN(val) && val >= 0 && val <= 100;
      const spentVND = isValid ? (val / 100) * data.settings.monthly_cost : null;
      const delta = (isValid && latest && latest.date !== today) ? val - latest.percent : null;

      const handleSave = () => {
        if (!isValid) return;
        const newEntry = { id: Date.now(), date: today, percent: val, note: note.trim() };
        const filtered = data.entries.filter(e => e.date !== today);
        const newData = { ...data, entries: [...filtered, newEntry] };
        onSave(newData);
        setSaved(true);
        setNote('');
        setTimeout(() => setSaved(false), 2500);
      };

      const handleChange = (e) => {
        const v = e.target.value;
        if (v === '' || (Number(v) >= 0 && Number(v) <= 100)) setPct(v);
      };

      const quickVals = [10, 25, 50, 75, 90, 100];

      return (
        <div className="fade-in">
          <div style={{ background:'rgba(139,92,246,0.08)', border:'1px solid rgba(139,92,246,0.2)', borderRadius:12, padding:'12px 14px', marginBottom:12, display:'flex', gap:10, alignItems:'center' }}>
            <span style={{ fontSize:18 }}>💡</span>
            <div style={{ fontSize:12, color:'var(--text2)', lineHeight:1.6 }}>
              Mở <strong style={{color:'var(--text)'}}>claude.ai → Settings → Usage</strong> để xem % usage, rồi nhập vào đây
            </div>
          </div>

          <div className="card">
            <div className="label" style={{ marginBottom:10 }}>Usage hiện tại</div>
            <div style={{ position:'relative' }}>
              <input
                ref={inputRef}
                type="number"
                className="big-input"
                placeholder="0"
                min="0" max="100"
                value={pct}
                onChange={handleChange}
                inputMode="decimal"
              />
              {pct !== '' && (
                <div style={{ position:'absolute', right:24, top:'50%', transform:'translateY(-50%)', fontSize:22, color:'var(--text3)', fontWeight:700, pointerEvents:'none' }}>%</div>
              )}
            </div>

            <div style={{ display:'flex', gap:6, marginTop:12, flexWrap:'wrap' }}>
              {quickVals.map(v => (
                <button key={v} onClick={() => setPct(String(v))} style={{
                  flex:1,
                  padding:'9px 2px',
                  borderRadius:10,
                  border:`1px solid ${String(v) === pct ? 'var(--accent)' : 'var(--border)'}`,
                  background: String(v) === pct ? 'rgba(139,92,246,0.15)' : 'var(--surface2)',
                  color: String(v) === pct ? 'var(--accent2)' : 'var(--text2)',
                  fontSize:13, fontWeight:700,
                  cursor:'pointer',
                  minWidth:0,
                }}>
                  {v}%
                </button>
              ))}
            </div>
          </div>

          {spentVND !== null && (
            <div className="card" style={{ padding:'16px 20px' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <div>
                  <div className="label">Đã tiêu tương đương</div>
                  <div style={{ fontSize:28, fontWeight:800, color:'var(--accent2)', marginTop:4, letterSpacing:'-0.5px' }}>{fmtVND(spentVND)}</div>
                </div>
                <div style={{ textAlign:'right' }}>
                  <div className="label">Còn lại</div>
                  <div style={{ fontSize:20, fontWeight:700, color:'var(--green)', marginTop:4 }}>{fmtVND(data.settings.monthly_cost - spentVND)}</div>
                </div>
              </div>
              {delta !== null && (
                <div style={{ marginTop:12, paddingTop:12, borderTop:'1px solid var(--border)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <span style={{ fontSize:13, color:'var(--text3)' }}>
                    Lần trước ({fmtDate(latest.date)}): <strong style={{ color:'var(--text2)' }}>{latest.percent}%</strong>
                  </span>
                  <span style={{ fontSize:13, fontWeight:700, color: delta > 0 ? 'var(--red)' : 'var(--green)' }}>
                    {delta > 0 ? '+' : ''}{delta.toFixed(1)}%
                  </span>
                </div>
              )}
            </div>
          )}

          <div style={{ marginBottom:12 }}>
            <input type="text" placeholder="Ghi chú (tùy chọn)..." value={note} onChange={e => setNote(e.target.value)}
              style={{ width:'100%', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12, color:'var(--text)', fontSize:15, padding:'14px 16px', outline:'none' }}
            />
          </div>

          <button className="btn-primary" onClick={handleSave} disabled={!isValid}>
            {saved ? '✓ Đã lưu thành công!' : `Lưu — ${today}`}
          </button>

          {todayEntry && (
            <div style={{ textAlign:'center', marginTop:10, fontSize:12, color:'var(--text3)' }}>
              Đã có dữ liệu hôm nay: <strong style={{ color:'var(--text2)' }}>{todayEntry.percent}%</strong> — sẽ được ghi đè
            </div>
          )}
        </div>
      );
    };

    // ── HISTORY TAB ───────────────────────────────────────────
    const History = ({ data }) => {
      const chartRef = useRef(null);
      const chartInstance = useRef(null);
      const { settings } = data;
      const monthEntries = getMonthEntries(data.entries, settings.billing_day);

      useEffect(() => {
        if (!chartRef.current) return;
        if (chartInstance.current) { chartInstance.current.destroy(); chartInstance.current = null; }
        if (monthEntries.length === 0) return;

        chartInstance.current = new Chart(chartRef.current, {
          type: 'line',
          data: {
            labels: monthEntries.map(e => fmtDate(e.date)),
            datasets: [{
              label: 'Usage %',
              data: monthEntries.map(e => e.percent),
              borderColor: '#8b5cf6',
              backgroundColor: 'rgba(139,92,246,0.08)',
              borderWidth: 2.5,
              pointBackgroundColor: '#a78bfa',
              pointBorderColor: '#1a1a24',
              pointBorderWidth: 2,
              pointRadius: 5,
              pointHoverRadius: 8,
              fill: true,
              tension: 0.35,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#1a1a24',
                borderColor: '#2a2a3a',
                borderWidth: 1,
                titleColor: '#94a3b8',
                bodyColor: '#f1f5f9',
                padding: 10,
                callbacks: {
                  label: (ctx) => {
                    const vnd = Math.round((ctx.parsed.y / 100) * settings.monthly_cost);
                    return `${ctx.parsed.y}%  ≈  ${vnd.toLocaleString('vi-VN')}đ`;
                  }
                }
              }
            },
            scales: {
              x: { ticks: { color:'#64748b', font:{size:11} }, grid: { color:'rgba(255,255,255,0.03)' } },
              y: {
                min: 0, max: 100,
                ticks: { color:'#64748b', font:{size:11}, callback: v => v+'%' },
                grid: { color:'rgba(255,255,255,0.03)' }
              }
            }
          }
        });
        return () => { if (chartInstance.current) chartInstance.current.destroy(); };
      }, [monthEntries.length, monthEntries.map(e=>e.percent).join(',')]);

      const currentPct = monthEntries.length > 0 ? monthEntries[monthEntries.length-1].percent : 0;
      const avgDelta = monthEntries.length >= 2
        ? (monthEntries[monthEntries.length-1].percent - monthEntries[0].percent) / (monthEntries.length - 1)
        : 0;

      return (
        <div className="fade-in">
          <div className="card">
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:16 }}>
              <div>
                <div className="label">Biểu đồ chu kỳ này</div>
                <div style={{ fontSize:13, color:'var(--text2)', marginTop:3, fontWeight:600 }}>{monthEntries.length} điểm dữ liệu</div>
              </div>
            </div>
            {monthEntries.length === 0 ? (
              <div style={{ height:160, display:'flex', alignItems:'center', justifyContent:'center', color:'var(--text3)', fontSize:14 }}>
                Chưa có dữ liệu trong chu kỳ này
              </div>
            ) : (
              <div style={{ height:190 }}><canvas ref={chartRef}/></div>
            )}
          </div>

          {monthEntries.length > 0 && (
            <div className="card">
              <div className="section-title">Thống kê chu kỳ</div>
              <div className="stat-row">
                <span style={{ color:'var(--text2)', fontSize:14 }}>Usage hiện tại</span>
                <strong>{fmtPct(currentPct)} = {fmtVND((currentPct/100)*settings.monthly_cost)}</strong>
              </div>
              <div className="stat-row">
                <span style={{ color:'var(--text2)', fontSize:14 }}>Trung bình mỗi lần ghi</span>
                <strong>{avgDelta > 0 ? `+${avgDelta.toFixed(1)}%` : '—'}</strong>
              </div>
              <div className="stat-row">
                <span style={{ color:'var(--text2)', fontSize:14 }}>Số lần ghi</span>
                <strong>{monthEntries.length} lần</strong>
              </div>
              <div className="stat-row">
                <span style={{ color:'var(--text2)', fontSize:14 }}>Weekly Limit</span>
                <strong>{settings.weekly_limit > 0 ? settings.weekly_limit : '—'}</strong>
              </div>
              <div className="stat-row">
                <span style={{ color:'var(--text2)', fontSize:14 }}>Session Limit</span>
                <strong>{settings.session_limit > 0 ? settings.session_limit : '—'}</strong>
              </div>
              <div className="stat-row">
                <span style={{ color:'var(--text2)', fontSize:14 }}>Chi phí tháng</span>
                <strong>{fmtVND(settings.monthly_cost)}</strong>
              </div>
            </div>
          )}

          {monthEntries.length > 0 && (
            <div>
              <div className="section-title" style={{ paddingLeft:2, marginTop:4 }}>Lịch sử chi tiết</div>
              {[...monthEntries].reverse().map((entry) => {
                const idx = monthEntries.findIndex(e => e.id === entry.id);
                const prev = idx > 0 ? monthEntries[idx - 1] : null;
                const delta = prev ? entry.percent - prev.percent : null;
                return (
                  <div key={entry.id} className="entry-item">
                    <div>
                      <div style={{ fontWeight:700, fontSize:15 }}>{fmtDate(entry.date)}</div>
                      {entry.note && <div style={{ fontSize:12, color:'var(--text3)', marginTop:2 }}>{entry.note}</div>}
                    </div>
                    <div style={{ textAlign:'right' }}>
                      <div style={{ fontWeight:800, fontSize:17 }}>{entry.percent}%</div>
                      <div style={{ fontSize:11, color:'var(--text3)' }}>{fmtVND((entry.percent/100)*settings.monthly_cost)}</div>
                      {delta !== null && (
                        <div style={{ fontSize:11, fontWeight:700, color: delta > 0 ? 'var(--red)' : 'var(--green)', marginTop:2 }}>
                          {delta > 0 ? '▲' : '▼'} {Math.abs(delta).toFixed(1)}%
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    // ── SETTINGS TAB ──────────────────────────────────────────
    const Settings = ({ data, onSave }) => {
      const [cost, setCost] = useState(String(data.settings.monthly_cost));
      const [billingDay, setBillingDay] = useState(String(data.settings.billing_day));
      const [weeklyLimit, setWeeklyLimit] = useState(String(data.settings.weekly_limit || ''));
      const [sessionLimit, setSessionLimit] = useState(String(data.settings.session_limit || ''));
      const [saved, setSaved] = useState(false);
      const [confirmClear, setConfirmClear] = useState(false);

      const handleSave = () => {
        const c = parseFloat(cost), b = parseInt(billingDay);
        if (isNaN(c) || isNaN(b) || b < 1 || b > 28) return;
        onSave({
          ...data,
          settings: {
            ...data.settings,
            monthly_cost: c,
            billing_day: b,
            weekly_limit: Number(weeklyLimit) || 0,
            session_limit: Number(sessionLimit) || 0,
          }
        });
        setSaved(true);
        setTimeout(() => setSaved(false), 2000);
      };

      const handleClear = () => {
        if (confirmClear) {
          onSave({ ...data, entries: [] });
          setConfirmClear(false);
        } else {
          setConfirmClear(true);
          setTimeout(() => setConfirmClear(false), 3000);
        }
      };

      const handleReonboard = () => {
        onSave({ ...data, settings: { ...data.settings, onboarded: false } });
      };

      const inputStyle = {
        width:'100%', background:'var(--surface2)', border:'1px solid var(--border)',
        borderRadius:12, color:'var(--text)', fontSize:20, fontWeight:800,
        padding:'12px 16px', outline:'none', marginTop:8,
      };

      return (
        <div className="fade-in">
          <div className="card">
            <div className="section-title">Cấu hình gói</div>

            <div style={{ marginBottom:16 }}>
              <div className="label">Phí hàng tháng (VNĐ)</div>
              <input type="number" value={cost} onChange={e => setCost(e.target.value)} style={inputStyle} inputMode="numeric"/>
              <div style={{ fontSize:11, color:'var(--text3)', marginTop:6 }}>Claude Pro ≈ 581.768đ · Max ≈ 2.908.840đ</div>
            </div>

            <div style={{ marginBottom:16 }}>
              <div className="label">Ngày bắt đầu chu kỳ</div>
              <input type="number" value={billingDay} onChange={e => setBillingDay(e.target.value)} min="1" max="28" style={inputStyle} inputMode="numeric"/>
              <div style={{ fontSize:11, color:'var(--text3)', marginTop:6 }}>Ngày trong tháng mà Claude tính phí (1-28)</div>
            </div>

            <div style={{ marginBottom:16 }}>
              <div className="label">Weekly Limit</div>
              <input type="number" value={weeklyLimit} onChange={e => setWeeklyLimit(e.target.value)} min="0" style={inputStyle} inputMode="numeric" placeholder="0"/>
              <div style={{ fontSize:11, color:'var(--text3)', marginTop:6 }}>Giới hạn usage % theo tuần (0 = ẩn)</div>
            </div>

            <div style={{ marginBottom:22 }}>
              <div className="label">Session Limit</div>
              <input type="number" value={sessionLimit} onChange={e => setSessionLimit(e.target.value)} min="0" style={inputStyle} inputMode="numeric" placeholder="0"/>
              <div style={{ fontSize:11, color:'var(--text3)', marginTop:6 }}>Giới hạn mỗi session/window (0 = ẩn)</div>
            </div>

            <button className="btn-primary" onClick={handleSave}>
              {saved ? '✓ Đã lưu cài đặt!' : 'Lưu cài đặt'}
            </button>
          </div>

          <div className="card">
            <div className="section-title">Dữ liệu</div>
            <div style={{ fontSize:13, color:'var(--text2)', marginBottom:14, lineHeight:1.7 }}>
              Dữ liệu lưu trong <strong>localStorage</strong> của trình duyệt.
              Sẽ mất nếu xoá cache. Tổng số lần ghi: <strong style={{ color:'var(--text)' }}>{data.entries.length}</strong>
            </div>

            <button onClick={handleClear} style={{
              width:'100%',
              background: confirmClear ? 'rgba(239,68,68,0.12)' : 'var(--surface2)',
              border:`1px solid ${confirmClear ? 'var(--red)' : 'var(--border)'}`,
              borderRadius:12, color: confirmClear ? 'var(--red)' : 'var(--text3)',
              fontSize:14, fontWeight:700, padding:'13px', cursor:'pointer', marginBottom:8,
            }}>
              {confirmClear ? '⚠️ Bấm lần nữa để xác nhận xoá tất cả' : '🗑 Xoá toàn bộ dữ liệu'}
            </button>

            <button onClick={handleReonboard} style={{
              width:'100%',
              background:'var(--surface2)', border:'1px solid var(--border)',
              borderRadius:12, color:'var(--text3)',
              fontSize:14, fontWeight:700, padding:'13px', cursor:'pointer',
            }}>
              🔄 Chạy lại Onboarding
            </button>
          </div>

          <div className="card" style={{ background:'rgba(139,92,246,0.05)', borderColor:'rgba(139,92,246,0.2)' }}>
            <div style={{ fontSize:13, color:'var(--text2)', lineHeight:1.8 }}>
              <strong style={{ color:'var(--text)', display:'block', marginBottom:6 }}>🤖 Về Claude Tracker</strong>
              Theo dõi hiệu quả sử dụng Claude Pro bằng cách quy đổi % usage → tiền VNĐ thực tế.
              Nhập liệu 1 lần/ngày từ <strong>claude.ai → Settings → Usage</strong>.
            </div>
          </div>
        </div>
      );
    };

    // ── MAIN APP ──────────────────────────────────────────────
    const NAV = [
      { id:'dashboard', label:'Dashboard', icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> },
      { id:'log', label:'Ghi lại', icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> },
      { id:'history', label:'Lịch sử', icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> },
      { id:'settings', label:'Cài đặt', icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> },
    ];

    const TITLES = { dashboard:'Claude Tracker', log:'Ghi lại hôm nay', history:'Lịch sử', settings:'Cài đặt' };

    const App = () => {
      const [tab, setTab] = useState('dashboard');
      const [data, setData] = useState(loadData);

      const handleSave = useCallback((newData) => {
        setData(newData);
        saveData(newData);
      }, []);

      const handleOnboardingComplete = useCallback((settingsOverride) => {
        const newData = {
          ...data,
          settings: { ...data.settings, ...settingsOverride },
        };
        setData(newData);
        saveData(newData);
      }, [data]);

      // Show onboarding if not completed yet
      if (!data.settings.onboarded) {
        return <Onboarding onComplete={handleOnboardingComplete} />;
      }

      return (
        <div>
          <div className="header">
            <h1 style={{ display:'flex', alignItems:'center', gap:8 }}>
              <span>🤖</span> {TITLES[tab]}
            </h1>
            <div style={{ background:'var(--surface)', border:'1px solid var(--border)', borderRadius:8, padding:'5px 11px', fontSize:12, color:'var(--text2)', fontWeight:600 }}>
              {fmtVNDShort(data.settings.monthly_cost)}/tháng
            </div>
          </div>

          <div className="content">
            {tab === 'dashboard' && <Dashboard data={data}/>}
            {tab === 'log' && <LogTab key="log" data={data} onSave={handleSave}/>}
            {tab === 'history' && <History data={data}/>}
            {tab === 'settings' && <Settings data={data} onSave={handleSave}/>}
          </div>

          <nav className="bottom-nav">
            {NAV.map(item => (
              <button key={item.id} className={`nav-item ${tab === item.id ? 'active' : ''}`} onClick={() => setTab(item.id)}>
                {item.icon}
                <span>{item.label}</span>
              </button>
            ))}
          </nav>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
